<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Tools — V2</title>
  <meta name="description" content="Text formatting and styling tools. Transform your text with one click." />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    /* ===== DESIGN SYSTEM (v2 tokens) ===== */
    :root {
      --bg: #161718;
      --bg-2: #1c1d1e;
      --bg-3: #222324;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.16);
      --accent: #ff4d1c;
      --accent-2: #ff7a50;
      --accent-glow: rgba(255, 77, 28, 0.25);
      --text: #ffffff;
      --text-2: rgba(255, 255, 255, 0.55);
      --text-3: rgba(255, 255, 255, 0.3);
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
      --radius: 14px;
      --radius-sm: 8px;
      --radius-pill: 999px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: rgba(255, 77, 28, 0.9); color: #fff; }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAAwBAMAAAClLOS0AAAAElBMVEUAAAAAAAAAAAAAAAAAAAAAAADgKxmiAAAABnRSTlMFBQUFBQWoay6DAAAASUlEQVQ4y2MQRgMMDCiBKIMoCkGhKIoqRBOE0MQxAFWRMIZCYQyFIugKhTEUCqMrFMZSKIylUBhLIYY5YugKMcwRw1CIMYcWAABFQi7MibxRjgAAAABJRU5ErkJggg==");
      background-repeat: repeat;
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.03;
    }

    /* Ambient glow */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .glow-orb-1 {
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(255, 122, 80, 0.05) 0%, rgba(255, 122, 80, 0.02) 30%, transparent 60%);
      bottom: -150px;
      right: -200px;
    }

    /* ===== LAYOUT ===== */
    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== NAV ===== */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(22, 23, 24, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      text-decoration: none;
      color: var(--text);
    }

    .nav-logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .nav-badge {
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 500;
      color: var(--accent);
      background: rgba(255, 77, 28, 0.1);
      border: 1px solid rgba(255, 77, 28, 0.2);
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      text-decoration: none;
      transition: color var(--transition);
      cursor: pointer;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--text); }

    /* ===== HERO ===== */
    .hero {
      padding: 80px 40px 48px;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      text-align: center;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 500;
      color: var(--accent);
      background: rgba(255, 77, 28, 0.08);
      border: 1px solid rgba(255, 77, 28, 0.2);
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeSlideUp 0.6s ease forwards 0.1s;
    }

    .hero-eyebrow::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    .hero h1 {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1.05;
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeSlideUp 0.6s ease forwards 0.2s;
    }

    .hero h1 span {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 16px;
      color: var(--text-2);
      line-height: 1.6;
      max-width: 500px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeSlideUp 0.6s ease forwards 0.3s;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== MAIN ===== */
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 0 40px 80px;
    }

    /* ===== TOOL PANEL ===== */
    .tool-panel {
      opacity: 0;
      animation: fadeSlideUp 0.6s ease forwards 0.4s;
    }

    /* ===== OPTIONS BAR ===== */
    .options-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .options-label {
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
      margin-right: 4px;
    }

    .option-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--sans);
      color: var(--text-2);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: all var(--transition);
      user-select: none;
      white-space: nowrap;
    }

    .option-chip:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: var(--surface-hover);
    }

    .option-chip.active {
      color: var(--text);
      background: rgba(255, 77, 28, 0.1);
      border-color: rgba(255, 77, 28, 0.3);
    }

    .option-chip.active .chip-dot {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-3);
      transition: all var(--transition);
      flex-shrink: 0;
    }

    /* ===== TEXT AREAS ===== */
    .text-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .text-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .text-col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .text-col-label {
      font-size: 12px;
      font-weight: 600;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
    }

    .char-count {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-3);
      transition: color var(--transition);
    }

    .text-area {
      width: 100%;
      min-height: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .text-area:focus {
      border-color: rgba(255, 77, 28, 0.4);
      box-shadow: 0 0 0 3px rgba(255, 77, 28, 0.08), 0 0 40px rgba(255, 77, 28, 0.04);
    }

    .text-area::placeholder {
      color: var(--text-3);
    }

    .text-area.output {
      background: var(--bg-2);
      cursor: default;
      color: var(--accent-2);
    }

    .text-area.output:focus {
      border-color: var(--border-hover);
      box-shadow: none;
    }

    /* ===== ACTION BAR ===== */
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      gap: 12px;
    }

    .action-bar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-pill {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-3);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-pill .val {
      color: var(--text-2);
      font-weight: 600;
    }

    .action-btn {
      font-size: 13px;
      font-weight: 600;
      font-family: var(--sans);
      color: var(--text-2);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-btn:hover {
      color: var(--text);
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }

    .action-btn.primary {
      background: var(--accent);
      color: white;
      border-color: transparent;
    }

    .action-btn.primary:hover {
      background: var(--accent-2);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .action-btn.primary:active {
      transform: translateY(0);
    }

    .action-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      animation: toastIn 0.3s ease;
      max-width: 320px;
    }

    .toast.success { border-left: 3px solid #4ade80; }
    .toast.error { border-left: 3px solid var(--accent); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      nav { padding: 16px 20px; }
      .nav-links { display: none; }
      .hero { padding: 48px 20px 32px; }
      main { padding: 0 20px 60px; }
      .text-grid {
        grid-template-columns: 1fr;
      }
      .text-area { min-height: 180px; }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="glow-orb glow-orb-1"></div>

    <!-- NAV -->
    <nav>
      <a class="nav-logo" href="/">
        <div class="nav-logo-icon">Tt</div>
        <span>Text</span>
        <span class="nav-badge">v2</span>
      </a>
      <ul class="nav-links">
        <li><a class="active" href="#">Format</a></li>
        <li><a href="https://v2-vl42.onrender.com/" target="_blank" rel="noopener">Viper</a></li>
      </ul>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-eyebrow">Text tools</div>
      <h1>Format text,<br><span>instantly.</span></h1>
      <p class="hero-sub">Paste your text, toggle formatting options, and copy the result. Real-time transformations with zero friction.</p>
    </section>

    <!-- MAIN -->
    <main>
      <div class="tool-panel">

        <!-- OPTIONS -->
        <div class="options-bar">
          <span class="options-label">Styles</span>
          <button class="option-chip active" id="opt-space-dot" data-option="spaceToDot">
            <span class="chip-dot"></span>
            Replace space with ·
          </button>
        </div>

        <!-- TEXT GRID -->
        <div class="text-grid">
          <div class="text-col">
            <div class="text-col-header">
              <span class="text-col-label">Input</span>
              <span class="char-count" id="input-count">0 chars</span>
            </div>
            <textarea class="text-area" id="text-input" placeholder="Paste or type your text here…" spellcheck="false"></textarea>
          </div>
          <div class="text-col">
            <div class="text-col-header">
              <span class="text-col-label">Output</span>
              <span class="char-count" id="output-count">0 chars</span>
            </div>
            <textarea class="text-area output" id="text-output" readonly placeholder="Formatted text will appear here…"></textarea>
          </div>
        </div>

        <!-- ACTION BAR -->
        <div class="action-bar">
          <div class="action-bar-left">
            <div class="stat-pill">
              <span>Replacements</span>
              <span class="val" id="replace-count">0</span>
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="action-btn" id="btn-clear">
              <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
              Clear
            </button>
            <button class="action-btn primary" id="btn-copy">
              <svg viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
              Copy
            </button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script>
    // ===== STATE =====
    const options = {
      spaceToDot: true,
    };

    const inputEl = document.getElementById('text-input');
    const outputEl = document.getElementById('text-output');
    const inputCount = document.getElementById('input-count');
    const outputCount = document.getElementById('output-count');
    const replaceCount = document.getElementById('replace-count');

    // ===== TRANSFORM =====
    function transform(text) {
      let result = text;
      let replacements = 0;

      if (options.spaceToDot) {
        const before = result;
        result = result.replace(/ /g, '·');
        // Count how many spaces were replaced
        for (let i = 0; i < before.length; i++) {
          if (before[i] === ' ') replacements++;
        }
      }

      return { result, replacements };
    }

    function update() {
      const text = inputEl.value;
      const { result, replacements } = transform(text);
      outputEl.value = result;

      inputCount.textContent = `${text.length} chars`;
      outputCount.textContent = `${result.length} chars`;
      replaceCount.textContent = replacements;
    }

    // ===== EVENTS =====
    inputEl.addEventListener('input', update);

    // Option toggles
    document.querySelectorAll('.option-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const key = chip.dataset.option;
        options[key] = !options[key];
        chip.classList.toggle('active', options[key]);
        update();
      });
    });

    // Copy
    document.getElementById('btn-copy').addEventListener('click', async () => {
      const text = outputEl.value;
      if (!text) {
        toast('Nothing to copy', 'error');
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        toast('Copied to clipboard!', 'success');
      } catch {
        toast('Copy failed', 'error');
      }
    });

    // Clear
    document.getElementById('btn-clear').addEventListener('click', () => {
      inputEl.value = '';
      update();
      inputEl.focus();
    });

    // ===== TOAST =====
    function toast(msg, type = 'success') {
      let container = document.querySelector('.toast-container');
      if (!container) {
        container = document.createElement('div');
        container.className = 'toast-container';
        document.body.appendChild(container);
      }
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span><span>${msg}</span>`;
      container.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // Initial
    update();
  </script>
</body>

</html>
